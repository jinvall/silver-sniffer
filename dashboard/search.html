<!DOCTYPE html>
<html>
<head>
  <title>Silver Sniffer Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Silver Sniffer Search</h1>

  <div class="panel" id="search-panel">
    <div style="margin-bottom:10px;">
      <label for="searchQuery" style="color:#ccc; font-weight:600;">Search query</label>
      <input id="searchQuery" type="search" placeholder="Enter MAC, BSSID, SSID, BLE name, movement, or metadata" style="width:100%; box-sizing:border-box; margin-top:6px; padding:8px; background:#111; color:#e0e0e0; border:1px solid #444; border-radius:4px;" />
    </div>

    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
      <button id="searchSubmit">Search</button>
      <button id="searchClear">Clear</button>
      <a href="index.html" class="link-button">Back to dashboard</a>
    </div>

    <div id="searchMessage" style="margin-bottom:12px; color:#ccc; font-size:14px;"></div>
    <div id="searchResults"></div>
  </div>

  <script src="search.js"></script>
</body>
</html>
